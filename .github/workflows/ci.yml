name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  check:
    name: Check and test
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Type check
        run: npm run check

      - name: Test
        run: npm run test
